# Copy this file to CloudBuddy repo as:
#   .github/workflows/publish-to-play-internal.yml
#
# In CloudBuddy repo: Settings -> Secrets and variables -> Actions:
#   PLAY_SERVICE_ACCOUNT_JSON = full JSON key of Google Play service account (plain text)
#   PLAY_PACKAGE_NAME         = applicationId from app/build.gradle.kts (e.g. com.example.cloudbuddy)
#   KEYSTORE_BASE64           = base64-encoded release keystore file (optional if signing in gradle)
#   KEYSTORE_PASSWORD         = keystore password
#   KEY_ALIAS                  = key alias
#   KEY_PASSWORD              = key password
#
# CloudBuddy app/build.gradle.kts must read signing from env (RELEASE_STORE_FILE, etc.)
# when those are set, so CI can sign the release. See README or DEPLOY in Ai_Companion.
#
name: Publish to Play (Internal testing)

on:
  workflow_dispatch:
    inputs:
      track:
        description: 'Release track'
        required: false
        default: 'internal'
        type: choice
        options:
          - internal
          - closed

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore (for signing)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "KEYSTORE_BASE64 not set; build may produce unsigned AAB (configure signing in build.gradle or add secret)"
            exit 0
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "RELEASE_STORE_FILE=$RUNNER_TEMP/release.keystore" >> $GITHUB_ENV
          echo "RELEASE_STORE_PASSWORD=$KEYSTORE_PASSWORD" >> $GITHUB_ENV
          echo "RELEASE_KEY_ALIAS=$KEY_ALIAS" >> $GITHUB_ENV
          echo "RELEASE_KEY_PASSWORD=$KEY_PASSWORD" >> $GITHUB_ENV

      - name: Build release AAB
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload to Google Play (Internal testing)
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ secrets.PLAY_PACKAGE_NAME }}
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed
